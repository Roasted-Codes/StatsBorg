<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halo 2 — Postgame Carnage Report</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e1a;
    color: #d0d4dc;
    font-family: 'Rajdhani', 'Segoe UI', Tahoma, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Game list screen ── */
  #game-list-screen {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px;
  }
  #game-list-screen h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #8ab4d8;
    margin-bottom: 16px;
  }
  .game-count {
    color: #5a7a9a;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .game-list-table {
    width: 100%;
    border-collapse: collapse;
  }
  .game-list-table th {
    background: #1a1e2a;
    color: #8a8e9a;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid #2a2e3a;
  }
  .game-list-table td {
    padding: 9px 12px;
    font-size: 15px;
    font-weight: 500;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .game-list-table tr:hover {
    background: rgba(106, 138, 180, 0.1);
    cursor: pointer;
  }
  .game-list-table .gt-badge {
    display: inline-block;
    background: #1a3050;
    color: #8ab4d8;
    padding: 1px 8px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Drag-drop fallback ── */
  #drop-fallback {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 24px;
  }
  #drop-fallback h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #8ab4d8;
  }
  #drop-zone {
    width: 480px;
    max-width: 90vw;
    padding: 48px 32px;
    border: 2px dashed #3a4a6a;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  #drop-zone:hover, #drop-zone.dragover {
    border-color: #6a8ab4;
    background: rgba(106, 138, 180, 0.08);
  }
  #drop-zone p { font-size: 18px; margin-bottom: 12px; }
  #drop-zone small { color: #6a7a9a; font-size: 14px; }
  #file-input { display: none; }

  /* ── Main viewer ── */
  #viewer { display: none; max-width: 960px; margin: 0 auto; padding: 20px; }
  #viewer.active { display: block; }

  /* ── Header banner ── */
  .header-banner {
    position: relative;
    background: linear-gradient(135deg, #1a2a4a 0%, #0d1a30 60%, #0a1020 100%);
    padding: 16px 24px;
    margin-bottom: 0;
    border-bottom: 2px solid #2a4a7a;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-banner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #4a8ad4, #2a5a9a, transparent);
  }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c0d0e8;
  }
  .tab-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .tab-arrow {
    font-size: 28px;
    color: #5a8ac0;
    cursor: pointer;
    user-select: none;
    padding: 4px 8px;
    transition: color 0.15s;
  }
  .tab-arrow:hover { color: #8ab4e0; }
  .tab-name {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c0d0e8;
    min-width: 180px;
    text-align: center;
  }

  /* ── Game info bar ── */
  .game-info {
    background: #0d1628;
    padding: 8px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    color: #6a8ab0;
    border-bottom: 1px solid #1a2a40;
  }
  .game-info .gametype-badge {
    background: #1a3050;
    color: #8ab4d8;
    padding: 2px 12px;
    border-radius: 3px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── Table ── */
  .pgcr-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  .pgcr-table th {
    background: #1a1e2a;
    color: #8a8e9a;
    font-weight: 600;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid #2a2e3a;
  }
  .pgcr-table th.num { text-align: right; }
  .pgcr-table td {
    padding: 10px 12px;
    font-size: 16px;
    font-weight: 500;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .pgcr-table td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .pgcr-table td.player-name {
    font-weight: 600;
    font-size: 17px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Row colors — cycling through Halo 2 player palette */
  .pgcr-table tr.row-0 { background: #2a2a30; }
  .pgcr-table tr.row-1 { background: #1a2050; }
  .pgcr-table tr.row-2 { background: #1e2858; }
  .pgcr-table tr.row-3 { background: #1a3828; }
  .pgcr-table tr.row-4 { background: #3a3820; }
  .pgcr-table tr.row-5 { background: #381a1a; }
  .pgcr-table tr.row-6 { background: #2a1a30; }
  .pgcr-table tr.row-7 { background: #30282a; }

  .pgcr-table tr.selected {
    outline: 2px solid rgba(255,255,255,0.7);
    outline-offset: -2px;
  }
  .pgcr-table tr[data-clickable]:hover {
    cursor: pointer;
    filter: brightness(1.2);
  }

  /* PvP hint */
  .pvp-hint {
    text-align: center;
    padding: 8px;
    color: #5a7a9a;
    font-size: 13px;
    font-style: italic;
  }

  /* Medal chips */
  .medal-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .medal-chip {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .medal-multi   { background: #4a2a60; color: #c8a0e0; }
  .medal-style   { background: #2a4060; color: #90b8d8; }
  .medal-spree   { background: #604a20; color: #e0c880; }
  .medal-obj     { background: #205040; color: #80c8a0; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
  }
  .btn {
    background: #1a2a4a;
    color: #8ab4d8;
    border: 1px solid #2a4a6a;
    padding: 6px 16px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .btn:hover { background: #2a3a5a; }
  .timestamp { color: #4a6080; font-size: 13px; }
</style>
</head>
<body>

<!-- ── Game List (served mode) ── -->
<div id="game-list-screen" style="display:none">
  <h1>Postgame Carnage Report</h1>
  <div class="game-count" id="game-count"></div>
  <table class="game-list-table">
    <thead><tr>
      <th style="width:22%">Date</th>
      <th style="width:15%">Gametype</th>
      <th style="width:10%">Players</th>
      <th>Winner</th>
    </tr></thead>
    <tbody id="game-list-body"></tbody>
  </table>
</div>

<!-- ── Drop fallback (local file mode) ── -->
<div id="drop-fallback">
  <h1>Postgame Carnage Report</h1>
  <div id="drop-zone" tabindex="0">
    <p>Drop a JSON file here</p>
    <small>or click to browse — loads halo2_stats.py output</small>
  </div>
  <input type="file" id="file-input" accept=".json">
</div>

<!-- ── Viewer ── -->
<div id="viewer">
  <div class="toolbar">
    <button class="btn" id="btn-back">Back to Games</button>
    <span class="timestamp" id="timestamp"></span>
  </div>
  <div class="header-banner">
    <span class="header-title">Postgame Carnage Report</span>
    <div class="tab-nav">
      <span class="tab-arrow" id="tab-left">&#9664;</span>
      <span class="tab-name" id="tab-name"></span>
      <span class="tab-arrow" id="tab-right">&#9654;</span>
    </div>
  </div>
  <div class="game-info">
    <span id="game-players"></span>
    <span class="gametype-badge" id="game-type"></span>
    <span id="game-source"></span>
  </div>
  <div id="tab-content"></div>
</div>

<script>
// ─── Medal definitions ───
const MEDAL_NAMES = [
  "Double Kill","Triple Kill","Overkill","Killtacular","Killtrocity","Killimanjaro+",
  "Sniper Kill","Splatter","Beat Down","Assassination","Destroyed Vehicle","Carjack","Stick",
  "Killing Spree","Killing Frenzy","Running Riot","Rampage","Untouchable",
  "Flag Grab","Flag Carrier Kill","Flag Returned",
  "Bomb Planted","Bomb Carrier Kill","Bomb Defused"
];

function medalCategory(bit) {
  if (bit <= 5) return "medal-multi";
  if (bit <= 12) return "medal-style";
  if (bit <= 17) return "medal-spree";
  return "medal-obj";
}

function decodeMedals(bitmask) {
  const medals = [];
  for (let i = 0; i < 24; i++) {
    if (bitmask & (1 << i)) medals.push({ name: MEDAL_NAMES[i], cat: medalCategory(i) });
  }
  return medals;
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return m + ":" + String(s).padStart(2, "0");
}

function formatDate(ts) {
  if (!ts) return "";
  return ts.replace("T", "  ").split(".")[0];
}

// ─── State ───
let data = null;
let currentTab = 0;
let pvpSelected = 0;
let servedMode = false;
const TAB_NAMES = ["PLAYER STATS", "KILLS", "PLAYER VS. PLAYER", "MEDALS", "HIT STATS"];

const gameListScreen = document.getElementById("game-list-screen");
const dropFallback = document.getElementById("drop-fallback");
const viewer = document.getElementById("viewer");

// ─── Init: try server API, fall back to drag-drop ───
(async function init() {
  try {
    const res = await fetch("/api/games");
    if (!res.ok) throw new Error();
    const games = await res.json();
    servedMode = true;
    showGameList(games);
  } catch {
    dropFallback.style.display = "flex";
    initDropZone();
  }
})();

// ─── Game list (served mode) ───
function showGameList(games) {
  gameListScreen.style.display = "block";
  dropFallback.style.display = "none";
  viewer.classList.remove("active");
  document.getElementById("game-count").textContent = games.length + " games";
  const tbody = document.getElementById("game-list-body");
  tbody.innerHTML = games.map(g => `<tr data-file="${esc(g.filename)}">
    <td>${formatDate(g.timestamp)}</td>
    <td><span class="gt-badge">${esc(g.gametype)}</span></td>
    <td>${g.player_count}</td>
    <td>${esc(g.winner)}</td>
  </tr>`).join("");
  tbody.querySelectorAll("tr").forEach(row => {
    row.addEventListener("click", () => loadFromServer(row.dataset.file));
  });
}

async function loadFromServer(filename) {
  try {
    const res = await fetch("/history/" + filename);
    data = await res.json();
    if (!data.players || !data.players.length) throw new Error("No players");
    currentTab = 0;
    pvpSelected = 0;
    showViewer();
  } catch (err) {
    alert("Failed to load: " + err.message);
  }
}

// ─── Drag-drop fallback (local file mode) ───
function initDropZone() {
  const dropZone = document.getElementById("drop-zone");
  const fileInput = document.getElementById("file-input");
  dropZone.addEventListener("click", () => fileInput.click());
  dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    if (e.dataTransfer.files.length) loadLocalFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener("change", () => { if (fileInput.files.length) loadLocalFile(fileInput.files[0]); });
}

function loadLocalFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      data = JSON.parse(e.target.result);
      if (!data.players || !data.players.length) throw new Error("No players found");
      currentTab = 0;
      pvpSelected = 0;
      showViewer();
    } catch (err) {
      alert("Failed to load: " + err.message);
    }
  };
  reader.readAsText(file);
}

// ─── Viewer ───
function showViewer() {
  gameListScreen.style.display = "none";
  dropFallback.style.display = "none";
  viewer.classList.add("active");
  document.getElementById("timestamp").textContent = data.timestamp ? formatDate(data.timestamp) : "";
  document.getElementById("game-type").textContent = (data.gametype || "unknown").toUpperCase();
  document.getElementById("game-players").textContent = data.player_count + " Players";
  document.getElementById("game-source").textContent = data.source === "pgcr_display" ? "PGCR Display" : "PCR";
  renderTab();
}

document.getElementById("btn-back").addEventListener("click", async () => {
  viewer.classList.remove("active");
  if (servedMode) {
    try {
      const res = await fetch("/api/games");
      const games = await res.json();
      showGameList(games);
    } catch { gameListScreen.style.display = "block"; }
  } else {
    dropFallback.style.display = "flex";
  }
});

// ─── Tab navigation ───
document.getElementById("tab-left").addEventListener("click", () => {
  currentTab = (currentTab - 1 + TAB_NAMES.length) % TAB_NAMES.length;
  renderTab();
});
document.getElementById("tab-right").addEventListener("click", () => {
  currentTab = (currentTab + 1) % TAB_NAMES.length;
  renderTab();
});
document.addEventListener("keydown", e => {
  if (!data) return;
  if (e.key === "ArrowLeft") { currentTab = (currentTab - 1 + TAB_NAMES.length) % TAB_NAMES.length; renderTab(); }
  if (e.key === "ArrowRight") { currentTab = (currentTab + 1) % TAB_NAMES.length; renderTab(); }
});

function renderTab() {
  document.getElementById("tab-name").textContent = TAB_NAMES[currentTab];
  const container = document.getElementById("tab-content");
  switch (currentTab) {
    case 0: container.innerHTML = renderPlayerStats(); break;
    case 1: container.innerHTML = renderKills(); break;
    case 2: container.innerHTML = renderPvP(); bindPvPClicks(); break;
    case 3: container.innerHTML = renderMedals(); break;
    case 4: container.innerHTML = renderHitStats(); break;
  }
}

function rowClass(i) { return "row-" + (i % 8); }

const GT_LABELS = {
  ctf: ["Flag Saves", "Flag Steals"],
  slayer: ["Avg Life", "Best Spree"],
  oddball: ["Ball Carrier Kills", "Kills As Carrier"],
  koth: ["Control Time", "Time On Hill"],
  juggernaut: ["Juggernaut Kills", "Kills As Juggernaut"],
  territories: ["Territories Taken", "Territories Lost"],
  assault: ["Bomb Grabs", "Bomb Carrier Kills"],
};

// ─── Tab 0: Player Stats ───
function renderPlayerStats() {
  const p = data.players;
  // Label resolution: gametype_stats keys > GT_LABELS lookup > "Value 0"/"Value 1"
  const gtKeys = p[0].gametype_stats ? Object.keys(p[0].gametype_stats) : [];
  const gtLookup = data.gametype ? GT_LABELS[data.gametype] : null;
  const col0 = gtKeys[0] || (gtLookup && gtLookup[0]) || "Value 0";
  const col1 = gtKeys[1] || (gtLookup && gtLookup[1]) || "Value 1";
  const isTimeCol0 = col0.toLowerCase().includes("life") || col0.toLowerCase().includes("time");
  const isTimeCol1 = col1.toLowerCase().includes("life") || col1.toLowerCase().includes("time");

  let html = `<table class="pgcr-table">
    <tr><th style="width:35%">Player</th><th class="num" style="width:12%">Place</th>
    <th class="num" style="width:18%">${col0}</th><th class="num" style="width:18%">${col1}</th>
    <th class="num" style="width:17%">Score</th></tr>`;
  for (let i = 0; i < p.length; i++) {
    const vals = p[i].gametype_values || [0, 0];
    const v0 = isTimeCol0 ? formatTime(vals[0]) : vals[0];
    const v1 = isTimeCol1 ? formatTime(vals[1]) : vals[1];
    html += `<tr class="${rowClass(i)}">
      <td class="player-name">${esc(p[i].name)}</td>
      <td class="num">${esc(p[i].place_string)}</td>
      <td class="num">${v0}</td><td class="num">${v1}</td>
      <td class="num">${esc(p[i].score_string)}</td></tr>`;
  }
  return html + "</table>";
}

// ─── Tab 1: Kills ───
function renderKills() {
  const p = data.players;
  let html = `<table class="pgcr-table">
    <tr><th style="width:35%">Player</th><th class="num">Kills</th>
    <th class="num">Assists</th><th class="num">Deaths</th><th class="num">Suicides</th></tr>`;
  for (let i = 0; i < p.length; i++) {
    html += `<tr class="${rowClass(i)}">
      <td class="player-name">${esc(p[i].name)}</td>
      <td class="num">${p[i].kills}</td><td class="num">${p[i].assists}</td>
      <td class="num">${p[i].deaths}</td><td class="num">${p[i].suicides}</td></tr>`;
  }
  return html + "</table>";
}

// ─── Tab 2: Player vs Player ───
function renderPvP() {
  const p = data.players;
  const sel = pvpSelected;
  let html = `<div class="pvp-hint">Viewing from <strong>${esc(p[sel].name)}</strong>'s perspective — click a row to change</div>`;
  html += `<table class="pgcr-table">
    <tr><th style="width:40%">Player</th><th class="num" style="width:30%">Killed</th>
    <th class="num" style="width:30%">Killed By</th></tr>`;
  for (let i = 0; i < p.length; i++) {
    const killed = p[sel].killed[i] || 0;
    const killedBy = p[i].killed[sel] || 0;
    const selClass = i === sel ? " selected" : "";
    html += `<tr class="${rowClass(i)}${selClass}" data-clickable data-idx="${i}">
      <td class="player-name">${esc(p[i].name)}</td>
      <td class="num">${killed}</td><td class="num">${killedBy}</td></tr>`;
  }
  return html + "</table>";
}

function bindPvPClicks() {
  document.querySelectorAll("[data-clickable]").forEach(row => {
    row.addEventListener("click", () => {
      pvpSelected = parseInt(row.dataset.idx);
      document.getElementById("tab-content").innerHTML = renderPvP();
      bindPvPClicks();
    });
  });
}

// ─── Tab 3: Medals ───
function renderMedals() {
  const p = data.players;
  let html = `<table class="pgcr-table">
    <tr><th style="width:30%">Player</th><th class="num" style="width:15%">Total Medals</th>
    <th style="width:55%">Medals Earned</th></tr>`;
  for (let i = 0; i < p.length; i++) {
    const medals = decodeMedals(p[i].medals.by_type);
    const chips = medals.map(m => `<span class="medal-chip ${m.cat}">${m.name}</span>`).join("");
    html += `<tr class="${rowClass(i)}">
      <td class="player-name">${esc(p[i].name)}</td>
      <td class="num">${p[i].medals.total}</td>
      <td><div class="medal-list">${chips}</div></td></tr>`;
  }
  return html + "</table>";
}

// ─── Tab 4: Hit Stats ───
function renderHitStats() {
  const p = data.players;
  let html = `<table class="pgcr-table">
    <tr><th style="width:30%">Player</th><th class="num">Shots Hit</th>
    <th class="num">Shots Fired</th><th class="num">Hit %</th><th class="num">Head Shots</th></tr>`;
  for (let i = 0; i < p.length; i++) {
    const a = p[i].accuracy;
    html += `<tr class="${rowClass(i)}">
      <td class="player-name">${esc(p[i].name)}</td>
      <td class="num">${a.shots_hit}</td><td class="num">${a.total_shots}</td>
      <td class="num">${a.percentage}</td><td class="num">${a.headshots}</td></tr>`;
  }
  return html + "</table>";
}

function esc(s) {
  if (s == null) return "";
  const d = document.createElement("div");
  d.textContent = String(s);
  return d.innerHTML;
}
</script>
</body>
</html>
