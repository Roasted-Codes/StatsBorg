<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halo 2 — Postgame Carnage Report</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" media="print" onload="this.media='all'">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0e1a;
    color: #d0d4dc;
    font-family: 'Rajdhani', 'Segoe UI', 'Helvetica Neue', Tahoma, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Game list screen ── */
  #game-list-screen {
    max-width: 960px;
    margin: 0 auto;
    padding: 20px;
  }
  #game-list-screen h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #8ab4d8;
    margin-bottom: 16px;
  }
  .game-count {
    color: #5a7a9a;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .game-list-table {
    width: 100%;
    border-collapse: collapse;
  }
  .game-list-table th {
    background: #1a1e2a;
    color: #8a8e9a;
    font-weight: 600;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid #2a2e3a;
  }
  .game-list-table td {
    padding: 9px 12px;
    font-size: 15px;
    font-weight: 500;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .game-list-table tr:hover {
    background: rgba(106, 138, 180, 0.1);
    cursor: pointer;
  }
  .game-list-table .gt-badge {
    display: inline-block;
    background: #1a3050;
    color: #8ab4d8;
    padding: 1px 8px;
    border-radius: 3px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .team-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* ── Loading / Error states ── */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 16px;
    color: #6a8ab0;
  }
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #1a2a40;
    border-top-color: #4a8ad4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error-msg {
    text-align: center;
    padding: 40px 20px;
    color: #aa6666;
  }
  .error-msg p { margin-bottom: 12px; }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #5a7a9a;
    font-size: 16px;
  }

  /* ── Drag-drop fallback ── */
  #drop-fallback {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 24px;
  }
  #drop-fallback h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #8ab4d8;
  }
  #drop-zone {
    width: 480px;
    max-width: 90vw;
    padding: 48px 32px;
    border: 2px dashed #3a4a6a;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  #drop-zone:hover, #drop-zone.dragover {
    border-color: #6a8ab4;
    background: rgba(106, 138, 180, 0.08);
  }
  #drop-zone p { font-size: 18px; margin-bottom: 12px; }
  #drop-zone small { color: #6a7a9a; font-size: 14px; }
  #file-input { display: none; }

  /* ── Main viewer ── */
  #viewer { display: none; max-width: 960px; margin: 0 auto; padding: 20px; }
  #viewer.active { display: block; }

  /* ── Header banner ── */
  .header-banner {
    position: relative;
    background: linear-gradient(135deg, #1a2a4a 0%, #0d1a30 60%, #0a1020 100%);
    padding: 16px 24px;
    margin-bottom: 0;
    border-bottom: 2px solid #2a4a7a;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-banner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, #4a8ad4, #2a5a9a, transparent);
  }
  .header-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c0d0e8;
  }
  .tab-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .tab-arrow {
    font-size: 28px;
    color: #5a8ac0;
    cursor: pointer;
    user-select: none;
    padding: 4px 8px;
    transition: color 0.15s;
  }
  .tab-arrow:hover { color: #8ab4e0; }
  .tab-name {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c0d0e8;
    min-width: 200px;
    text-align: center;
  }

  /* ── Game info bar ── */
  .game-info {
    background: #0d1628;
    padding: 8px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    color: #6a8ab0;
    border-bottom: 1px solid #1a2a40;
  }
  .game-info .gametype-badge {
    background: #1a3050;
    color: #8ab4d8;
    padding: 2px 12px;
    border-radius: 3px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* ── Team score banner ── */
  .team-banner {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 24px;
    padding: 12px 24px;
    background: #0d1628;
    border-bottom: 1px solid #1a2a40;
  }
  .team-banner-side {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .team-banner-score {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .team-banner-vs {
    color: #4a6080;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 2px;
  }

  /* ── Table ── */
  .pgcr-table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }
  .pgcr-table th {
    background: #1a1e2a;
    color: #8a8e9a;
    font-weight: 600;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 10px 12px;
    text-align: left;
    border-bottom: 1px solid #2a2e3a;
  }
  .pgcr-table th.num { text-align: right; }
  .pgcr-table td {
    padding: 10px 12px;
    font-size: 16px;
    font-weight: 500;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .pgcr-table td.num {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .pgcr-table td.player-name {
    font-weight: 600;
    font-size: 17px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Row colors — cycling through Halo 2 player palette (FFA) */
  .pgcr-table tr.row-0 { background: #2a2a30; }
  .pgcr-table tr.row-1 { background: #1a2050; }
  .pgcr-table tr.row-2 { background: #1e2858; }
  .pgcr-table tr.row-3 { background: #1a3828; }
  .pgcr-table tr.row-4 { background: #3a3820; }
  .pgcr-table tr.row-5 { background: #381a1a; }
  .pgcr-table tr.row-6 { background: #2a1a30; }
  .pgcr-table tr.row-7 { background: #30282a; }

  /* Team header row */
  .pgcr-table tr.team-header-row td {
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 8px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .pgcr-table tr.selected {
    outline: 2px solid rgba(255,255,255,0.7);
    outline-offset: -2px;
  }
  .pgcr-table tr[data-clickable]:hover {
    cursor: pointer;
    filter: brightness(1.2);
  }

  /* PvP hint */
  .pvp-hint {
    text-align: center;
    padding: 8px;
    color: #5a7a9a;
    font-size: 13px;
    font-style: italic;
  }

  /* Medal chips */
  .medal-list {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .medal-chip {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 3px;
    white-space: nowrap;
  }
  .medal-multi   { background: #4a2a60; color: #c8a0e0; }
  .medal-style   { background: #2a4060; color: #90b8d8; }
  .medal-spree   { background: #604a20; color: #e0c880; }
  .medal-obj     { background: #205040; color: #80c8a0; }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
  }
  .btn {
    background: #1a2a4a;
    color: #8ab4d8;
    border: 1px solid #2a4a6a;
    padding: 6px 16px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .btn:hover { background: #2a3a5a; }
  .timestamp { color: #4a6080; font-size: 13px; }
</style>
</head>
<body>

<!-- ── Game List (served mode) ── -->
<div id="game-list-screen" style="display:none">
  <h1>Postgame Carnage Report</h1>
  <div class="game-count" id="game-count"></div>
  <div id="game-list-content">
    <table class="game-list-table">
      <thead><tr>
        <th style="width:22%">Date</th>
        <th style="width:15%">Gametype</th>
        <th style="width:10%">Players</th>
        <th>Result</th>
      </tr></thead>
      <tbody id="game-list-body"></tbody>
    </table>
  </div>
</div>

<!-- ── Drop fallback (local file mode) ── -->
<div id="drop-fallback">
  <h1>Postgame Carnage Report</h1>
  <div id="drop-zone" tabindex="0">
    <p>Drop a JSON file here</p>
    <small>or click to browse — loads halo2_stats.py output</small>
  </div>
  <input type="file" id="file-input" accept=".json">
</div>

<!-- ── Viewer ── -->
<div id="viewer">
  <div class="toolbar">
    <button class="btn" id="btn-back">Back to Games</button>
    <span class="timestamp" id="timestamp"></span>
  </div>
  <div class="header-banner">
    <span class="header-title">Postgame Carnage Report</span>
    <div class="tab-nav">
      <span class="tab-arrow" id="tab-left">&#9664;</span>
      <span class="tab-name" id="tab-name"></span>
      <span class="tab-arrow" id="tab-right">&#9654;</span>
    </div>
  </div>
  <div class="game-info">
    <span id="game-players"></span>
    <span class="gametype-badge" id="game-type"></span>
    <span id="game-source"></span>
  </div>
  <div id="team-banner" class="team-banner" style="display:none"></div>
  <div id="tab-content"></div>
</div>

<script>
// ─── Utilities ───
function safe(obj) {
  for (let i = 1; i < arguments.length; i++) {
    if (obj == null) return 0;
    obj = obj[arguments[i]];
  }
  return obj != null ? obj : 0;
}

function esc(s) {
  if (s == null) return "";
  const d = document.createElement("div");
  d.textContent = String(s);
  return d.innerHTML;
}

function formatTime(seconds) {
  if (seconds == null) return "0:00";
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return m + ":" + String(s).padStart(2, "0");
}

function formatDate(ts) {
  if (!ts) return "";
  return ts.replace("T", "  ").split(".")[0];
}

// ─── Medal definitions ───
const MEDAL_NAMES = [
  "Double Kill","Triple Kill","Overkill","Killtacular","Killtrocity","Killimanjaro+",
  "Sniper Kill","Splatter","Beat Down","Assassination","Destroyed Vehicle","Carjack","Stick",
  "Killing Spree","Killing Frenzy","Running Riot","Rampage","Untouchable",
  "Flag Grab","Flag Carrier Kill","Flag Returned",
  "Bomb Planted","Bomb Carrier Kill","Bomb Defused"
];

function medalCategory(bit) {
  if (bit <= 5) return "medal-multi";
  if (bit <= 12) return "medal-style";
  if (bit <= 17) return "medal-spree";
  return "medal-obj";
}

function decodeMedals(bitmask) {
  const medals = [];
  if (!bitmask) return medals;
  for (let i = 0; i < 24; i++) {
    if (bitmask & (1 << i)) medals.push({ name: MEDAL_NAMES[i], cat: medalCategory(i) });
  }
  return medals;
}

// ─── Team color system ───
const TEAM_COLORS = {
  0: { name: "Red",    bg: "#4a1a1a", border: "#8a3030", text: "#ff6666", dot: "#ff4444" },
  1: { name: "Blue",   bg: "#1a2a5a", border: "#3050a0", text: "#6699ff", dot: "#4488ff" },
  2: { name: "Yellow", bg: "#4a4a1a", border: "#8a8a30", text: "#ffff66", dot: "#ffff44" },
  3: { name: "Green",  bg: "#1a4a1a", border: "#308a30", text: "#66ff66", dot: "#44ff44" },
  4: { name: "Purple", bg: "#3a1a4a", border: "#6030a0", text: "#bb66ff", dot: "#aa44ff" },
  5: { name: "Orange", bg: "#4a3a1a", border: "#a07030", text: "#ffaa44", dot: "#ff9922" },
  6: { name: "Brown",  bg: "#3a2a1a", border: "#6a5030", text: "#cc9966", dot: "#bb8855" },
  7: { name: "Pink",   bg: "#4a1a3a", border: "#a03060", text: "#ff66bb", dot: "#ff44aa" },
};

function getTeamColor(teamId) {
  return TEAM_COLORS[teamId] || { name: "Unknown", bg: "#2a2a30", border: "#4a4a50", text: "#aaaaaa", dot: "#888888" };
}

function isTeamGame() {
  return data && data.teams && data.teams.length > 0 &&
         data.players.some(function(p) { return p.team !== 65535 && p.team != null; });
}

function getTeamsSorted() {
  if (!data || !data.teams) return [];
  return data.teams.slice().sort(function(a, b) { return (a.place || 0) - (b.place || 0); });
}

function getTeamPlayers(teamId) {
  if (!data || !data.players) return [];
  return data.players.filter(function(p) { return p.team === teamId; });
}

// ─── Gametype labels ───
const GT_LABELS = {
  ctf: ["Flag Saves", "Flag Steals"],
  slayer: ["Avg Life", "Best Spree"],
  oddball: ["Ball Carrier Kills", "Kills As Carrier"],
  koth: ["Control Time", "Time On Hill"],
  juggernaut: ["Juggernaut Kills", "Kills As Juggernaut"],
  territories: ["Territories Taken", "Territories Lost"],
  assault: ["Bomb Grabs", "Bomb Carrier Kills"],
};

// ─── State ───
let data = null;
let currentTab = 0;
let pvpSelected = 0;
let servedMode = false;

const gameListScreen = document.getElementById("game-list-screen");
const dropFallback = document.getElementById("drop-fallback");
const viewer = document.getElementById("viewer");

// ─── Dynamic tabs ───
function getTabNames() {
  if (isTeamGame()) {
    return ["TEAM STATS", "PLAYER STATS", "KILLS", "PLAYER VS. PLAYER", "MEDALS", "HIT STATS"];
  }
  return ["PLAYER STATS", "KILLS", "PLAYER VS. PLAYER", "MEDALS", "HIT STATS"];
}

// ─── Init: try server API, fall back to drag-drop ───
(async function init() {
  var content = document.getElementById("game-list-content");
  content.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><span>Loading games...</span></div>';
  gameListScreen.style.display = "block";
  try {
    var res = await fetch("/api/games");
    if (!res.ok) throw new Error("Server returned " + res.status);
    var games = await res.json();
    servedMode = true;
    showGameList(games);
  } catch (e) {
    gameListScreen.style.display = "none";
    dropFallback.style.display = "flex";
    initDropZone();
  }
})();

// ─── Game list (served mode) ───
function showGameList(games) {
  gameListScreen.style.display = "block";
  dropFallback.style.display = "none";
  viewer.classList.remove("active");

  var content = document.getElementById("game-list-content");

  if (!games || games.length === 0) {
    document.getElementById("game-count").textContent = "";
    content.innerHTML = '<div class="empty-state">No games recorded yet. Play a game in Halo 2 with watch mode running.</div>';
    return;
  }

  document.getElementById("game-count").textContent = games.length + " games";

  content.innerHTML = '<table class="game-list-table"><thead><tr>' +
    '<th style="width:22%">Date</th>' +
    '<th style="width:15%">Gametype</th>' +
    '<th style="width:10%">Players</th>' +
    '<th>Result</th>' +
    '</tr></thead><tbody id="game-list-body"></tbody></table>';

  var tbody = document.getElementById("game-list-body");
  tbody.innerHTML = games.map(function(g) {
    var result = "";
    if (g.teams && g.teams.length > 0) {
      result = g.teams.map(function(t) {
        var tc = getTeamColor(t.team_id);
        return '<span class="team-dot" style="background:' + tc.dot + '"></span>' +
               esc(t.name || tc.name) + ' ' + esc(t.score_string || "0");
      }).join(' <span style="color:#4a6080;margin:0 4px">vs</span> ');
    } else {
      result = esc(g.winner || "");
    }
    return '<tr data-file="' + esc(g.filename) + '">' +
      '<td>' + formatDate(g.timestamp) + '</td>' +
      '<td><span class="gt-badge">' + esc(g.gametype) + '</span></td>' +
      '<td>' + (g.player_count || 0) + '</td>' +
      '<td>' + result + '</td></tr>';
  }).join("");

  tbody.querySelectorAll("tr").forEach(function(row) {
    row.addEventListener("click", function() { loadFromServer(row.dataset.file); });
  });
}

async function loadFromServer(filename) {
  var container = document.getElementById("tab-content");
  // Show loading state in viewer immediately
  currentTab = 0;
  pvpSelected = 0;
  try {
    var res = await fetch("/history/" + filename);
    if (!res.ok) throw new Error("HTTP " + res.status);
    data = await res.json();
    if (!data.players || !data.players.length) throw new Error("No players in game data");
    showViewer();
  } catch (err) {
    data = null;
    gameListScreen.style.display = "block";
    var content = document.getElementById("game-list-content");
    content.innerHTML = '<div class="error-msg"><p>Failed to load game: ' + esc(err.message) + '</p>' +
      '<button class="btn" onclick="location.reload()">Retry</button></div>';
  }
}

// ─── Drag-drop fallback (local file mode) ───
function initDropZone() {
  var dropZone = document.getElementById("drop-zone");
  var fileInput = document.getElementById("file-input");
  dropZone.addEventListener("click", function() { fileInput.click(); });
  dropZone.addEventListener("dragover", function(e) { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", function() { dropZone.classList.remove("dragover"); });
  dropZone.addEventListener("drop", function(e) {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    if (e.dataTransfer.files.length) loadLocalFile(e.dataTransfer.files[0]);
  });
  fileInput.addEventListener("change", function() { if (fileInput.files.length) loadLocalFile(fileInput.files[0]); });
}

function loadLocalFile(file) {
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      data = JSON.parse(e.target.result);
      if (!data.players || !data.players.length) throw new Error("No players found");
      currentTab = 0;
      pvpSelected = 0;
      showViewer();
    } catch (err) {
      data = null;
      dropFallback.style.display = "flex";
      document.getElementById("drop-zone").innerHTML =
        '<p style="color:#aa6666">Failed to load: ' + esc(err.message) + '</p>' +
        '<small>Try dropping another JSON file</small>';
    }
  };
  reader.readAsText(file);
}

// ─── Viewer ───
function showViewer() {
  gameListScreen.style.display = "none";
  dropFallback.style.display = "none";
  viewer.classList.add("active");
  document.getElementById("timestamp").textContent = data.timestamp ? formatDate(data.timestamp) : "";
  document.getElementById("game-type").textContent = (data.gametype || "unknown").toUpperCase();
  document.getElementById("game-players").textContent = (data.player_count || data.players.length) + " Players";
  document.getElementById("game-source").textContent = data.source === "pgcr_display" ? "PGCR Display" : "PCR";

  // Team score banner
  var banner = document.getElementById("team-banner");
  if (isTeamGame()) {
    var teams = getTeamsSorted();
    banner.style.display = "flex";
    banner.innerHTML = teams.map(function(t, i) {
      var tc = getTeamColor(t.team_id);
      var side = '<div class="team-banner-side">' +
        '<span style="color:' + tc.text + '">' + esc(t.name || tc.name) + '</span>' +
        '<span class="team-banner-score" style="color:' + tc.text + '">' + esc(t.score_string || "0") + '</span>' +
        '</div>';
      return (i > 0 ? '<span class="team-banner-vs">VS</span>' : '') + side;
    }).join("");
  } else {
    banner.style.display = "none";
    banner.innerHTML = "";
  }

  renderTab();
}

document.getElementById("btn-back").addEventListener("click", async function() {
  viewer.classList.remove("active");
  data = null;
  if (servedMode) {
    var content = document.getElementById("game-list-content");
    content.innerHTML = '<div class="loading-wrap"><div class="spinner"></div><span>Loading games...</span></div>';
    gameListScreen.style.display = "block";
    try {
      var res = await fetch("/api/games");
      var games = await res.json();
      showGameList(games);
    } catch (e) {
      content.innerHTML = '<div class="error-msg"><p>Failed to load game list</p>' +
        '<button class="btn" onclick="location.reload()">Retry</button></div>';
    }
  } else {
    dropFallback.style.display = "flex";
  }
});

// ─── Tab navigation ───
document.getElementById("tab-left").addEventListener("click", function() {
  var tabs = getTabNames();
  currentTab = (currentTab - 1 + tabs.length) % tabs.length;
  renderTab();
});
document.getElementById("tab-right").addEventListener("click", function() {
  var tabs = getTabNames();
  currentTab = (currentTab + 1) % tabs.length;
  renderTab();
});
document.addEventListener("keydown", function(e) {
  if (!data) return;
  var tabs = getTabNames();
  if (e.key === "ArrowLeft") { currentTab = (currentTab - 1 + tabs.length) % tabs.length; renderTab(); }
  if (e.key === "ArrowRight") { currentTab = (currentTab + 1) % tabs.length; renderTab(); }
});

function renderTab() {
  var tabs = getTabNames();
  if (currentTab >= tabs.length) currentTab = 0;
  document.getElementById("tab-name").textContent = tabs[currentTab];
  var container = document.getElementById("tab-content");
  var tabName = tabs[currentTab];

  switch (tabName) {
    case "TEAM STATS":         container.innerHTML = renderTeamStats(); break;
    case "PLAYER STATS":       container.innerHTML = renderPlayerStats(); break;
    case "KILLS":              container.innerHTML = renderKills(); break;
    case "PLAYER VS. PLAYER":  container.innerHTML = renderPvP(); bindPvPClicks(); break;
    case "MEDALS":             container.innerHTML = renderMedals(); break;
    case "HIT STATS":          container.innerHTML = renderHitStats(); break;
  }
}

function rowClass(i) { return "row-" + (i % 8); }

// ─── Team-grouped table helper ───
function renderPlayerTable(headerHtml, colCount, rowFn) {
  if (isTeamGame()) {
    var html = '<table class="pgcr-table"><tr>' + headerHtml + '</tr>';
    var teams = getTeamsSorted();
    for (var t = 0; t < teams.length; t++) {
      var team = teams[t];
      var tc = getTeamColor(team.team_id);
      var players = getTeamPlayers(team.team_id);
      html += '<tr class="team-header-row" style="background:' + tc.bg + ';border-left:3px solid ' + tc.border + '">' +
        '<td colspan="' + colCount + '" style="color:' + tc.text + '">' +
        esc(team.name || tc.name) + ' — ' + esc(team.score_string || "") + '</td></tr>';
      for (var i = 0; i < players.length; i++) {
        html += rowFn(players[i], i, tc);
      }
    }
    return html + '</table>';
  } else {
    var html = '<table class="pgcr-table"><tr>' + headerHtml + '</tr>';
    var p = data.players;
    for (var i = 0; i < p.length; i++) {
      html += rowFn(p[i], i, null);
    }
    return html + '</table>';
  }
}

// ─── Tab: Team Stats (team games only) ───
function renderTeamStats() {
  var teams = getTeamsSorted();
  var html = '<table class="pgcr-table">' +
    '<tr><th style="width:40%">Team</th><th class="num" style="width:20%">Place</th>' +
    '<th class="num" style="width:20%">Score</th><th class="num" style="width:20%">Players</th></tr>';
  for (var i = 0; i < teams.length; i++) {
    var t = teams[i];
    var tc = getTeamColor(t.team_id);
    var playerCount = getTeamPlayers(t.team_id).length;
    html += '<tr style="background:' + tc.bg + ';border-left:3px solid ' + tc.border + '">' +
      '<td class="player-name" style="color:' + tc.text + '">' + esc(t.name || tc.name) + '</td>' +
      '<td class="num">' + esc(t.place_string || ("#" + ((t.place || 0) + 1))) + '</td>' +
      '<td class="num" style="color:' + tc.text + ';font-weight:700;font-size:18px">' + esc(t.score_string || "0") + '</td>' +
      '<td class="num">' + playerCount + '</td></tr>';
  }
  return html + '</table>';
}

// ─── Tab: Player Stats ───
function renderPlayerStats() {
  var p = data.players;
  var gtKeys = (p[0] && p[0].gametype_stats) ? Object.keys(p[0].gametype_stats) : [];
  var gtLookup = data.gametype ? GT_LABELS[data.gametype] : null;
  var col0 = gtKeys[0] || (gtLookup && gtLookup[0]) || "Value 0";
  var col1 = gtKeys[1] || (gtLookup && gtLookup[1]) || "Value 1";
  var isTimeCol0 = col0.toLowerCase().indexOf("life") >= 0 || col0.toLowerCase().indexOf("time") >= 0;
  var isTimeCol1 = col1.toLowerCase().indexOf("life") >= 0 || col1.toLowerCase().indexOf("time") >= 0;

  var header = '<th style="width:30%">Player</th><th class="num" style="width:12%">Place</th>' +
    '<th class="num" style="width:18%">' + esc(col0) + '</th>' +
    '<th class="num" style="width:18%">' + esc(col1) + '</th>' +
    '<th class="num" style="width:15%">Score</th>';

  return renderPlayerTable(header, 5, function(player, i, tc) {
    var vals = player.gametype_values || [0, 0];
    var v0 = isTimeCol0 ? formatTime(vals[0]) : vals[0];
    var v1 = isTimeCol1 ? formatTime(vals[1]) : vals[1];
    var bg = tc ? 'style="background:' + tc.bg + '"' : 'class="' + rowClass(i) + '"';
    return '<tr ' + bg + '>' +
      '<td class="player-name">' + esc(player.name) + '</td>' +
      '<td class="num">' + esc(player.place_string) + '</td>' +
      '<td class="num">' + v0 + '</td><td class="num">' + v1 + '</td>' +
      '<td class="num">' + esc(player.score_string) + '</td></tr>';
  });
}

// ─── Tab: Kills ───
function renderKills() {
  var header = '<th style="width:30%">Player</th><th class="num">Kills</th>' +
    '<th class="num">Assists</th><th class="num">Deaths</th><th class="num">Suicides</th>';

  return renderPlayerTable(header, 5, function(player, i, tc) {
    var bg = tc ? 'style="background:' + tc.bg + '"' : 'class="' + rowClass(i) + '"';
    return '<tr ' + bg + '>' +
      '<td class="player-name">' + esc(player.name) + '</td>' +
      '<td class="num">' + (player.kills || 0) + '</td>' +
      '<td class="num">' + (player.assists || 0) + '</td>' +
      '<td class="num">' + (player.deaths || 0) + '</td>' +
      '<td class="num">' + (player.suicides || 0) + '</td></tr>';
  });
}

// ─── Tab: Player vs Player ───
function renderPvP() {
  var p = data.players;
  if (!p || p.length === 0) return "";
  var sel = Math.min(pvpSelected, p.length - 1);

  var html = '<div class="pvp-hint">Viewing from <strong>' + esc(p[sel].name) + '</strong>\'s perspective — click a row to change</div>';

  if (isTeamGame()) {
    html += '<table class="pgcr-table"><tr><th style="width:40%">Player</th>' +
      '<th class="num" style="width:30%">Killed</th><th class="num" style="width:30%">Killed By</th></tr>';
    var teams = getTeamsSorted();
    for (var t = 0; t < teams.length; t++) {
      var team = teams[t];
      var tc = getTeamColor(team.team_id);
      var players = getTeamPlayers(team.team_id);
      html += '<tr class="team-header-row" style="background:' + tc.bg + ';border-left:3px solid ' + tc.border + '">' +
        '<td colspan="3" style="color:' + tc.text + '">' + esc(team.name || tc.name) + '</td></tr>';
      for (var i = 0; i < players.length; i++) {
        var pi = data.players.indexOf(players[i]);
        var killed = (p[sel].killed || [])[pi] || 0;
        var killedBy = ((players[i].killed || [])[sel]) || 0;
        var selClass = pi === sel ? " selected" : "";
        html += '<tr style="background:' + tc.bg + '"' + selClass + ' data-clickable data-idx="' + pi + '">' +
          '<td class="player-name">' + esc(players[i].name) + '</td>' +
          '<td class="num">' + killed + '</td><td class="num">' + killedBy + '</td></tr>';
      }
    }
    html += '</table>';
  } else {
    html += '<table class="pgcr-table"><tr><th style="width:40%">Player</th>' +
      '<th class="num" style="width:30%">Killed</th><th class="num" style="width:30%">Killed By</th></tr>';
    for (var i = 0; i < p.length; i++) {
      var killed = (p[sel].killed || [])[i] || 0;
      var killedBy = (p[i].killed || [])[sel] || 0;
      var selClass = i === sel ? " selected" : "";
      html += '<tr class="' + rowClass(i) + selClass + '" data-clickable data-idx="' + i + '">' +
        '<td class="player-name">' + esc(p[i].name) + '</td>' +
        '<td class="num">' + killed + '</td><td class="num">' + killedBy + '</td></tr>';
    }
    html += '</table>';
  }
  return html;
}

function bindPvPClicks() {
  document.querySelectorAll("[data-clickable]").forEach(function(row) {
    row.addEventListener("click", function() {
      pvpSelected = parseInt(row.dataset.idx);
      document.getElementById("tab-content").innerHTML = renderPvP();
      bindPvPClicks();
    });
  });
}

// ─── Tab: Medals ───
function renderMedals() {
  var header = '<th style="width:30%">Player</th><th class="num" style="width:15%">Total</th>' +
    '<th style="width:55%">Medals Earned</th>';

  return renderPlayerTable(header, 3, function(player, i, tc) {
    var bitmask = safe(player, "medals", "by_type");
    var total = safe(player, "medals", "total");
    var medals = decodeMedals(bitmask);
    var chips = medals.map(function(m) {
      return '<span class="medal-chip ' + m.cat + '">' + m.name + '</span>';
    }).join("");
    var bg = tc ? 'style="background:' + tc.bg + '"' : 'class="' + rowClass(i) + '"';
    return '<tr ' + bg + '>' +
      '<td class="player-name">' + esc(player.name) + '</td>' +
      '<td class="num">' + total + '</td>' +
      '<td><div class="medal-list">' + chips + '</div></td></tr>';
  });
}

// ─── Tab: Hit Stats ───
function renderHitStats() {
  var header = '<th style="width:30%">Player</th><th class="num">Shots Hit</th>' +
    '<th class="num">Shots Fired</th><th class="num">Hit %</th><th class="num">Head Shots</th>';

  return renderPlayerTable(header, 5, function(player, i, tc) {
    var shotsHit = safe(player, "accuracy", "shots_hit");
    var totalShots = safe(player, "accuracy", "total_shots");
    var pct = safe(player, "accuracy", "percentage");
    var headshots = safe(player, "accuracy", "headshots");
    var bg = tc ? 'style="background:' + tc.bg + '"' : 'class="' + rowClass(i) + '"';
    return '<tr ' + bg + '>' +
      '<td class="player-name">' + esc(player.name) + '</td>' +
      '<td class="num">' + shotsHit + '</td><td class="num">' + totalShots + '</td>' +
      '<td class="num">' + pct + '</td><td class="num">' + headshots + '</td></tr>';
  });
}
</script>
