<H1><A name="_dx_q_glos"></A>Q</H1>

<DL>
<DT><A NAME="_dx_quaternion_glos"></A><B>quaternion</B></DT>

<DD>A fourth element added to the [<I>x</I>, <I>y</I>, <I>z</I>] values that define a vector. Quaternions define a 3D axis and a rotation around that axis.
</DD>

<DT><A NAME="_xb_quickmatch_gloss"></A><B>QuickMatch</B></DT>

<DD>A Matchmaking feature of Xbox <i>Live</i> that returns a list of available game sessions based on limited search parameters. See also <a href="o.htm#_xb_optimatch_gloss">OptiMatch</a>.
</DD>

</DL>
