<H1><A name="_dx_y_glos"></A>Y</H1>

<DL>
<DT><A NAME="_win32_y_axis_gloss"></A><B>y-axis</B></DT>

<DD>The axis that normally extends vertically across a coordinate space.</DD>

<DT><A NAME="_win32_yuv_color_space_gloss"></A><B>YUV color space</B></DT>

<DD>A color space type that is true-color encoding. It uses one luminance value (Y) and two chroma values (UV). YUV is typically used by video displays. </DD>
</DL>
