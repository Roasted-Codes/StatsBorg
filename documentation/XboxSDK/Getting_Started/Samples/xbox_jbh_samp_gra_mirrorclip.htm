<H1 class="heading"><A NAME=""></A>MirrorClip Sample</H1>


<P class="content">The MirrorClip sample illustrates an innovative way of clipping a scene to achieve a mirror effect.</P>

<P class="content">Since user clip planes are not available on Xbox, this sample shows how to use the view frustrum and a stencil buffer to clip to a mirror plane.</P>
