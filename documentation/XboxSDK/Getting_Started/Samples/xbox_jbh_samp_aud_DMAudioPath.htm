<H1 class="heading"><A NAME=""></A>DMAudioPath Sample</H1>


<P class="intro">The DMAudioPath sample demonstrates how to use DirectMusic 3D audiopaths to play sound effects positioned in 3D space.  The sample has the same functionality as the <a href="xbox_jbh_samp_aud_play3dsound.htm">Play3DSound</a> sample but uses DirectMusic instead of DirectSound.</P>
