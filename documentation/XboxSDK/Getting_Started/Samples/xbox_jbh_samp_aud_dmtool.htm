<H1 class="heading"><A NAME=""></A>DMTool Sample</H1>


<P class="content">The DMTool sample demonstrates how to use DirectMusic tools to synchronize video and audio.  The tool intercepts note messages and keeps track of the most recent note message for each note on each channel, which is then displayed on screen.</P>
