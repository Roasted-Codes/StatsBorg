<h1>QualityOfService Sample</h1>

<p>The QualityOfService sample demonstrates quality of service APIs in the Xbox
Title Libraries. The sample shows how to handle both System Link probing and
Online probing. Online lookups are enabled to both security gateways and other
Xbox consoles.</p>
