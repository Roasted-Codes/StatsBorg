<H1 class="heading"><A NAME=""></A>DM3DScript Sample</H1>


<P class="intro">The DM3DScript sample demonstrates how to use DirectMusic 3D audiopaths to play sound effects positioned in 3D space. The sample has the same functionality as the 
<a href="xbox_jbh_samp_aud_dmaudiopath.htm">DMAudioPath</a> sample but uses DirectMusic scripting.</P>
