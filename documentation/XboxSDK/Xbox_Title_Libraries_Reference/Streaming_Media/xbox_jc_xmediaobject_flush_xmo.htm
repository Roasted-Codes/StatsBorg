<H1><A NAME="xbox_jc_xmediaobject_flush_xmo"></A>XMediaObject::Flush</H1>

<P>Flushes buffer (stops output and completes all packets).</P>

<PRE class=syntax><B>HRESULT Flush();</B></PRE>

<H4>Return Values</H4>

<P><B>Flush</B> should return DS_OK if successful, or an error specific to the Xbox Media Object otherwise.</P>


<H4>Requirements </H4>

<P><B>&nbsp;&nbsp;Header: </B>Declared in dsound.h.</P>
