<H1><A NAME="_dx_d3dvector_graphics"></A>D3DVECTOR</H1>

<P>Defines a 3D vector.</P>

<PRE class=syntax>typedef struct _D3DVECTOR {
    float x;
    float y;
    float z;
} D3DVECTOR;
</PRE>

<H4>Members</H4>

<DL>
<DT><B>x</B>, <B>y</B> and <B>z</B></DT>

<DD>Floating-point values that describes the vector.
</DD>
</DL>
