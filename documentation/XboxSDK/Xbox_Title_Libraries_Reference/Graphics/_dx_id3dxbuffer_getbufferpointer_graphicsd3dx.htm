<H1><A NAME="_dx_id3dxbuffer_getbufferpointer_graphicsd3dx"></A>ID3DXBuffer::GetBufferPointer</H1>

<P>Retrieves a pointer to the data in the buffer.</P>

<PRE class=syntax><B>LPVOID</B> <B>GetBufferPointer();</B>
</PRE>

<H4>Parameters</H4>

<P>None.</P>

<H4>Return Values</H4>
