<H1><A NAME="_dx_id3dxbuffer_getbuffersize_graphicsd3dx"></A>ID3DXBuffer::GetBufferSize</H1>

<P>Retrieves the total size of the data in the buffer.</P>

<PRE class=syntax><B>DWORD</B> <B>GetBufferSize();</B>
</PRE>

<H4>Parameters</H4>

<P>None.</P>

<H4>Return Values</H4>

<P>Returns the total size of the data in the buffer, in bytes. </P>

<H4>Requirements </H4>

<P><B>&nbsp;&nbsp;Header: </B>Declared in d3dx8mesh.h.<BR>
<B>&nbsp;&nbsp;Import Library:</B> Use d3dx8.lib.</P>
