<H1><A NAME="_dx_fog_effects_graphics"></A>Fog Effects</H1>

<P>The Microsoft&#174; Direct3D&#174; transformation and lighting engine can create fog effects during lighting. This type of fog is usually referred to as vertex fog because fog information is placed in the alpha component of the vertex to be rasterized. </P>
