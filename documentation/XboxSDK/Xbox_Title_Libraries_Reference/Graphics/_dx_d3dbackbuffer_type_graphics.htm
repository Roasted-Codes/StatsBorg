<H1><A NAME="_dx_d3dbackbuffer_type_graphics"></A>D3DBACKBUFFER_TYPE</H1>

<P>The <B>D3DBACKBUFFER_TYPE</b> value is used to specify the type of back buffer.</P>

<PRE class=syntax>typedef DWORD D3DBACKBUFFER_TYPE;
</PRE>

<H4>Constants</H4>

<DL>
<DT>D3DBACKBUFFER_TYPE_MONO</DT>

<DD>Specifies a non-stereo swap chain.</DD>

</DL>
