<H1><A NAME=""></A>XFONT::GetTextColor</H1>

<p>Gets the color of the text.</p>

<pre class=syntax><b>D3DCOLOR __stdcall GetTextColor(</b><b>);</b>
</pre>

<h4>Parameters</h4>

<p>None.</p>

<h4>Return Values</h4>

<p>Returns the color of the text.</p>

<h4>Requirements</h4>

<p><b>&nbsp;&nbsp;Header:</b> Declared in xfont.h<br>
<b>&nbsp;&nbsp;Import Library:</b> Use xgraphics.lib</p>

<p><a href="xgraphics_xfont_interface.htm"><b>XFONT</b></a>, <a href="xgraphics_xfont_settextcolor.htm"><b>XFONT::SetTextColor</b></a></p>
