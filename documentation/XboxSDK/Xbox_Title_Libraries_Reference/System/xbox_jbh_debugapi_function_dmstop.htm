<H1><A NAME="_win32_createfile"></A>DmStop</H1>

<P class="content">Suspends all Xbox title threads.</P>

<PRE class=syntax><b>DMHRAPI DmStop(void);</b></PRE>

<H4>Return Values</H4>

<P class="content">Returns XBDM_NOERR if successful, an error value otherwise.</P>
