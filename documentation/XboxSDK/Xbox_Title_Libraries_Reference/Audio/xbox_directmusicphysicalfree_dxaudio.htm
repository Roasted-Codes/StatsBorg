<H1><A NAME="xbox_directmusicphysicalfree_dxaudio"></A>DirectMusicPhysicalFree</H1>

<P>Frees memory allocated by <A HREF="xbox_directmusicphysicalalloc_dxaudio.htm"><B>DirectMusicPhysicalAlloc</B></A>.</P>

<PRE class="syntax"><B>DirectMusicPhysicalFree(</B>
    <B>void</B> <I>*lpAddress</I>
<B>);</B></PRE>

<H4>Parameters</H4>

<DL>
<DT><I>lpAddress</I></DT>
    <DD>Address of the physical memory to be released.</DD>
</DL>

<H4>Return Values</H4>
<P>None.</P>

<H4>Requirements </H4>
<P><B>&nbsp;&nbsp;Header: </B>Declared in DMusicI.h.</P>
