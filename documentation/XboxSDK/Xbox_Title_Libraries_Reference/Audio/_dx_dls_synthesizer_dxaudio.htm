<H1><A NAME="_dx_dls_synthesizer_dxaudio"></A>DLS Synthesizer</H1>

<P>Data that is not already in the form of a wave&#8212;a MIDI note, for example&#8212;has to be converted to a wave form before it can be played by the sound card. This conversion is done by a synthesizer on the Xbox Media Communications Processor (MCP). </P>
