<H1><A NAME="xbox_directmusicfree_dxaudio"></A>DirectMusicFree</H1>

<P>Frees memory allocated by <A HREF="xbox_directmusicalloc_dxaudio.htm"><B>DirectMusicAlloc</B></A>.</P>

<PRE class="syntax"><B>DirectMusicFree(</B>
    <B>void</B> <I>*pv</I>
<B>);</B></PRE>

<H4>Parameters</H4>

<DL>
<DT><I>pv</I></DT>
    <DD>Address of the memory to be released.</DD>
</DL>

<H4>Return Values</H4>
<P>None.</P>

<H4>Requirements </H4>
<P><B>&nbsp;&nbsp;Header: </B>Declared in DMusicI.h.</P>
