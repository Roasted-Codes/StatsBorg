<H1><A NAME="_dx_mixing_sounds_dxaudio"></A>Mixing Sounds</H1>

<P>To mix multiple streams with DirectSound, create sound buffers, obtaining an <A HREF="_dx_idirectsoundbuffer8_dxaudio.htm">IDirectSoundBuffer8</A> interface for each sound. Then, play the buffers simultaneously. DirectSound takes care of the mixing and plays the result.</P>
