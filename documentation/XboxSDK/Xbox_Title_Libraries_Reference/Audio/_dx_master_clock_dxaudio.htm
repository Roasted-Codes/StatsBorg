<H4><A NAME="_dx_master_clock_dxaudio"></A>Master Clock</H4>

<p>To guarantee accurate timing with an acceptably low latency, DirectMusic utlizizes a master clock driven by the Xbox Media Communications Processor (MCP). The master clock is a high-resolution timer used by all DirectMusic processes. This clock can not be replaced by the title.</p>
