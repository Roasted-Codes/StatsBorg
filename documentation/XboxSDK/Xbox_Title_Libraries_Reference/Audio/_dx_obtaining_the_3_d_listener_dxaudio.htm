<H4><A NAME="_dx_obtaining_the_3_d_listener_dxaudio"></A>Obtaining the 3D Listener</H4>

<P>The methods used to manipulate the 3D listener are on the <A HREF="_dx_idirectsound8_dxaudio.htm"><B>IDirectSound8</B></A> interface itself.  There is only a single <B>IDirectSound8</B> object per application; therefore there is only one listener.</P>
