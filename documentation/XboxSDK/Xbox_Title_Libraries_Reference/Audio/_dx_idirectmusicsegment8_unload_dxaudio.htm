<H1><A NAME="_dx_idirectmusicsegment8_unload_dxaudio"></A>IDirectMusicSegment8::Unload</H1>

<p>Obsolete. DirectMusic now loads the entire DLS collection when a segment references it, so this method is no longer needed.</p>
<!-- OMIT: 
<P>Unloads instrument data from a performance or audiopath.</P>

-->

<PRE class="syntax"><B>HRESULT Unload(</B>
    <B>IUnknown</B> <I>*pAudioPath</I>
<B>);</B>
</PRE>

<!-- OMIT: 
<H4>Parameters</H4>

<DL>
<DT><I>pAudioPath</I></DT>

<DD>Pointer to the <B>IUnknown</B> interface of the performance or audiopath from which to unload the instrument data.</DD>
</DL>

<H4>Return Values</H4>

<P>Returns S_OK if successful, an error code otherwise.  Can return one of the following error values:</P>

<TABLE>

<TR VALIGN="top">
<TD width=100%><A HREF="_dx_directmusic_return_values_by_name_dxaudio.htm#_dx_e_pointer_dxaudio"><B>E_POINTER</B></A></TD>
</TR>
</TABLE><BR>

<H4>Remarks</H4>

<P>This method succeeds even if no data was previously downloaded.</P>

<P>Unloading a segment while it is playing is not recommended, and will result in silence (due to the absence of instruments) and debug messages printed by DirectMusic. The following line is an example of the debug message that will be printed.</P>

<PRE>DMUSIC: Error: No instrument/region was found for patch # 0, note 69</PRE>

-->

<P><B>&nbsp;&nbsp;Header: </B>Declared in DMusici.h.</P>
