<h1>IXACTWmaPlayList::Next</h1>
<p>Transitions to the next song in an XACT WMA playlist.</p>
<pre class="syntax" xml:space="preserve"><b>HRESULT</b> <b>Next(</b><b>);</b>
</pre>
<h4><a name="parameters"></a>Parameters</h4>
<p>None.</p>
<h4><a name="return"></a>Return Values</h4>
            <p>Returns DS_OK if successful; returns an error code otherwise.</p>
