<H1><A NAME="xbox_idirectmusicheap_free_dxaudio"></A>IDirectMusicHeap::Free</H1>

<P>Releases memory allocated by <A HREF="xbox_idirectmusicheap_allocate_dxaudio.htm"><B>IDirectMusicHeap::Allocate</B></A>.</P>

<PRE class="syntax"><B>HRESULT Free(</B>
    <B>PVOID</B> <I>pData</I>
<B>);</B></PRE>

<H4>Parameters</H4>

<DL>
<DT><I>pData</I></DT>
    <DD>Address of the memory to release.</DD>
</DL>

<H4>Return Values</H4>
<P>Returns S_OK if successful, an error code otherwise.</P>

<H4>Requirements </H4>
<P><B>&nbsp;&nbsp;Header: </B>Declared in DMusicI.h.</P>
