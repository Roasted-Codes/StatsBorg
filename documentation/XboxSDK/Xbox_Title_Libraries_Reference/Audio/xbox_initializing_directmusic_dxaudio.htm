<h1>Initializing DirectMusic</h1>
<p>Titles using Microsoft® DirectMusic® <a href="xbox_directmusicinitialize_dxaudio.htm">DirectMusicInitialize</a>, <a href="xbox_directmusicinitializeex_dxaudio.htm">DirectMusicInitializeEx</a>, or <a href="xbox_directmusicinitializefixedsizeheaps_dxaudio.htm">DirectMusicInitializeFixedSizeHeaps</a> must be called before making any calls to DirectMusic. Titles are only allowed to call one of these initialization functions once per .xbe file.</p>
