<h1>Image Builder Warning IM1017</h1>
<p><b>no version detected for '<i>module</i>'</b></p><p>This warning occurs when Image Builder cannot find a version number for either 
		the Xbox Title Libraries (XTL), the kernel, or both. Please verify that you are 
		using valid versions of the XTL and kernel.</p>
