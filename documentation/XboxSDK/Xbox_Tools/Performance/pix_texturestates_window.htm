<h1>PIX Texturestates Window</h1>
<p>The <b>Texturestates</b> window shows the value of each texture state for each texture stage at the point indicated in the <a href="pix_timeline_window.htm">Timeline Window</a>. For more information on each of the texture states, see <a href="_dx_d3dtexturestagestatetype_graphics.htm">D3DTEXTURESTAGESTATETYPE</a>.</p>
