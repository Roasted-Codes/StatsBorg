<h1>PIX Renderstates Window</h1>
<p>The <b>Renderstates</b> window shows the value of each render state at the point indicated in the <a href="pix_timeline_window.htm">Timeline Window</a>. For more information on each of the render states, see <a href="_dx_d3drenderstatetype_graphics.htm">D3DRENDERSTATETYPE</a>.</p>
