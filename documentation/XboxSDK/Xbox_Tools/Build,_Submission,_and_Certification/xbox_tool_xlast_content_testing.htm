<h1>Previewing Content Packages in Downloader</h1>
<p>To preview the Xbox <i>Live</i> content package on your local Xbox, ensure first that your title 
builds without errors. Next, choose <i>Test On Local Xbox</i> from the <i>Action</i> 
menu. When XLAST version 3 finishes, your content package can be tested on your local Xbox.</p>
