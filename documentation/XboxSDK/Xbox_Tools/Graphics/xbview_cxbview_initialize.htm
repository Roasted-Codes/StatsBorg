<h1>CXBView::Initialize (XbView)</h1>
<p><b>CXBView::Initialize</b> loads whatever basic data is needed such as fonts, help screens, and so on. It also initializes the member variables of the class to their default values and instructs XbView to start loading the default XBR file, which is always named xbrc_out.xbr. </p>
